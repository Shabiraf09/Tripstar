<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Tripster – Book Your Stay</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">Tripster</div>
    <ul class="nav-links">
      <li><a href="#home">Home</a></li>
      <li><a href="#rooms">Rooms</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
    <div class="nav-icons">
      <button class="icon-btn" id="notifBtn" title="Notifications">
        <i class="fa-regular fa-bell"></i>
        <span class="badge" id="notifBadge">3</span>
      </button>
      <button class="icon-btn" id="bookingBtn" title="My Bookings">
        <i class="fa-regular fa-calendar-check"></i>
        <span class="badge" id="bookingBadge">1</span>
      </button>
      <a href="#rooms" class="btn-primary">Book Now</a>
    </div>
    <button class="hamburger" id="hamburger"><i class="fa-solid fa-bars"></i></button>
  </nav>
</body>
</html>
